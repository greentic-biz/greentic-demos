    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const redirectedPath = params.get("p");

        if (!redirectedPath) {
          return;
        }

        const redirectedQuery = params.get("q");
        const redirectedHash = params.get("h");
        const nextUrl =
          redirectedPath +
          (redirectedQuery ? "?" + redirectedQuery : "") +
          (redirectedHash ? "#" + redirectedHash : "");

        window.history.replaceState(null, "", nextUrl);
      })();
    </script>
