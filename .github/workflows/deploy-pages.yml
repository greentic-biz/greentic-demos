name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PAGES_CUSTOM_DOMAIN: ${{ vars.PAGES_CUSTOM_DOMAIN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Select Vite base path
        run: |
          if [ -n "$PAGES_CUSTOM_DOMAIN" ]; then
            echo "VITE_BASE_PATH=/" >> "$GITHUB_ENV"
            echo "PAGES_CNAME=$PAGES_CUSTOM_DOMAIN" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE_PATH=${{ steps.pages.outputs.base_path }}" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Verify Pages artifact
        run: |
          test -f dist/index.html
          test -f dist/.nojekyll
          test -f dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
